services:
  raincoat-web:
    container_name: raincoat-web
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    environment:
      PORT: "3100"
      API_BASE_URL: "http://raincoat-api:3200"
    ports:
      - "3100:3100"
    restart: unless-stopped

  raincoat-api:
    container_name: raincoat-api
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      PORT: "3200"
      RAINCOAT_DATA_ROOT: "/srv/raincoat/data"
    ports:
      - "3200:3200"
    volumes:
      - /srv/raincoat/data:/srv/raincoat/data
    restart: unless-stopped

  raincoat-worker:
    container_name: raincoat-worker
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      RAINCOAT_DATA_ROOT: "/srv/raincoat/data"
    volumes:
      - /srv/raincoat/data:/srv/raincoat/data
    restart: unless-stopped
